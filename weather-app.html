<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="weather-app.css" />
  </head>
  <body>
    <div id="card">
      <h1 id="app-title">Weather App</h1>
      <input id="city-name" type="text" placeholder="Enter City Name" />
      <button id="search" type="button">Search</button>
      <div id="weather-display">
        <section id="weather-info">
          <h2 id="city"></h2>
          <p id="temperature"></p>
          <p id="feels-like"></p>
          <p id="high-low"></p>
          <p id="conditions"></p>
          <button id="clear">Clear Data</button>
        </section>
      </div>
    </div>
    <script src="config.js"></script>
    <script src="weather-app.js"></script>
  </body>
</html>
